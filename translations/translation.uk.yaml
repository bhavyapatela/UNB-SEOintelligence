# =============================================
# CONTEXT: Issue types. Name and description of the issue types. Displayed in the issue index page.
# =============================================
ERROR_50x: URL повертають код стану 50x
ERROR_50x_DESC: Цей тип помилок зазвичай виникає через баги сервера або неправильну конфігурацію. Сторінки не завантажуються належним чином, показуючи сторінку помилки, що відлякує користувачів і дратує пошукові системи.

ERROR_40x: URL повертають код стану 40x
ERROR_40x_DESC: Ці сторінки відсутні, і ваші користувачі та пошукові системи губляться. Це може сигналізувати пошуковим системам, що сайт погано обслуговується. З часом занадто велика кількість битих посилань може вплинути на ефективність сканування та знизити авторитет сайту.

ERROR_30x: URL повертають код стану 30x
ERROR_30x_DESC: URL, що викликають перенаправлення (редіректи), відправляють користувачів та пошукові системи на іншу сторінку. Редіректи можуть уповільнити завантаження, заплутати користувачів і витрачати бюджет сканування (crawl budget) пошукової системи.

ERROR_REDIRECT_CHAIN: URL викликають ланцюжок перенаправлень
ERROR_REDIRECT_CHAIN_DESC: Ланцюжки перенаправлень — це коли URL перенаправляє на інший URL, який також перенаправляє кудись ще. Це розчаровує користувачів і ускладнює ефективне сканування та індексацію вашого контенту пошуковими системами.

ERROR_REDIRECT_LOOP: URL викликають цикл перенаправлень
ERROR_REDIRECT_LOOP_DESC: Цикли перенаправлень — це пара URL, які перенаправляють один на одного, створюючи нескінченну петлю. Це заважає користувачам і пошуковим системам дістатися до місця призначення. Це призводить до поганого досвіду користувачів, зламаної навігації та блокує правильне сканування й індексацію сайту.

ERROR_DUPLICATED_TITLE: Сторінки з дубльованими заголовками (title)
ERROR_DUPLICATED_TITLE_DESC: Тег title вважається одним із найважливіших елементів для on-page SEO. Якщо кілька сторінок мають однаковий заголовок, вони конкуруватимуть за певний пошуковий запит, заплутуючи пошукові системи.

ERROR_LONG_TITLE: Сторінки з довгим заголовком
ERROR_LONG_TITLE_DESC: Довгі заголовки не вплинуть на ваше on-page SEO, але вони зазвичай обрізаються в результатах пошуку та, як правило, отримують менше кліків.

ERROR_SHORT_TITLE: Сторінки з коротким заголовком
ERROR_SHORT_TITLE_DESC: Заголовки цих сторінок занадто короткі. Пошукові системи будуть більш задоволені, якщо ви надасте довші та інформативніші заголовки.

ERROR_EMPTY_TITLE: Сторінки з відсутнім заголовком
ERROR_EMPTY_TITLE_DESC: Заголовки сторінок допомагають пошуковим системам зрозуміти, про що сторінка, і часто відображаються в результатах пошуку. Без заголовка ваша сторінка може ранжуватися нижче, бути пропущеною користувачами та виглядати непрофесійно.

ERROR_EMPTY_DESCRIPTION: Сторінки з відсутнім meta description
ERROR_EMPTY_DESCRIPTION_DESC: Опис сторінки не є фактором ранжування, але пошукові системи часто використовують його для сніпетів у видачі.

ERROR_SHORT_DESCRIPTION: Сторінки з коротким meta description
ERROR_SHORT_DESCRIPTION_DESC: Опис сторінки не є фактором ранжування, але пошукові системи часто використовують його для сніпетів у видачі.

ERROR_LONG_DESCRIPTION: Сторінки з довгим meta description
ERROR_LONG_DESCRIPTION_DESC: Теги опису не є фактором ранжування, але якісний опис дозволить відобразити точнішу інформацію в результатах пошуку. Довгі описи часто обрізаються, що робить їх менш привабливими для користувачів.

ERROR_DUPLICATED_DESCRIPTION: Сторінки з дубльованим meta description
ERROR_DUPLICATED_DESCRIPTION_DESC: Рекомендується мати унікальні описи для кожної сторінки, щоб пошукові системи краще розуміли ваш контент.

ERROR_LITTLE_CONTENT: Сторінки з малою кількістю контенту
ERROR_LITTLE_CONTENT_DESC: Сторінки з мінімальним контентом не є корисними ні для користувачів, ні для пошукових систем. Подумайте про додавання більшої кількості контенту на ці сторінки.

ERROR_IMAGES_NO_ALT: Сторінки із зображеннями без атрибута alt
ERROR_IMAGES_NO_ALT_DESC: Атрибут alt покращує доступність сайту та допомагає пошуковим системам краще розуміти ваші зображення.

ERROR_NO_H1: Сторінки без заголовка H1
ERROR_NO_H1_DESC: Тег H1 описує головну тему сторінки. Без нього вашим користувачам і пошуковим системам буде важче зрозуміти, про що йдеться.

ERROR_NO_LANG: Сторінки без атрибута мови (lang)
ERROR_NO_LANG_DESC: Атрибут мови особливо корисний для скрінрідерів, і його рекомендується використовувати. Деякі пошукові системи використовують його, щоб показувати відповідну сторінку користувачам залежно від їхньої мови, але це не впливає на ранжування.

ERROR_HTTP_LINKS: HTTPS URL з посиланнями на HTTP
ERROR_HTTP_LINKS_DESC: Посилання з захищених HTTPS сторінок на незахищені HTTP. Повністю захищений вебсайт ранжується краще, ніж ті, що не мають HTTPS, і це також робить користувачів щасливішими.

ERROR_HREFLANG_RETURN: Сторінки без зворотного hreflang
ERROR_HREFLANG_RETURN_DESC: При посиланні на сторінку через hreflang, ця сторінка повинна посилатися назад через hreflang. Без цього двостороннього посилання пошукові системи можуть ігнорувати анотації hreflang.

ERROR_TOO_MANY_LINKS: Сторінки з надмірною кількістю посилань
ERROR_TOO_MANY_LINKS_DESC: SEO-вага (link juice) розподіляється між усіма посиланнями на сторінці. Чим більше посилань, тим менше ваги передається кожному. Переконайтеся, що всі посилання релевантні, видаліть зайві або використовуйте атрибут nofollow.

ERROR_INTERNAL_NOFOLLOW: Внутрішні посилання nofollow
ERROR_INTERNAL_NOFOLLOW_DESC: Внутрішні посилання зазвичай не повинні використовувати атрибут nofollow, якщо вони не ведуть на сторінки, які ви не хочете індексувати. Перевірте внутрішні посилання та переконайтеся, що важливі сторінки пов'язані без атрибута nofollow.

ERROR_EXTERNAL_WITHOUT_NOFOLLOW: Сторінки із зовнішніми follow-посиланнями
ERROR_EXTERNAL_WITHOUT_NOFOLLOW_DESC: Follow-посилання передають SEO-авторитет зовнішнім сайтам. Варто слідкувати за цим, щоб уникнути посилального спаму в коментарях та контенті, створеному користувачами.

ERROR_CANONICALIZED_NON_CANONICAL: Канонічне посилання на неканонічну сторінку
ERROR_CANONICALIZED_NON_CANONICAL_DESC: Сторінки, канонічні посилання яких ведуть на неканонічні URL. Канонічні сторінки повинні вказувати на канонічну версію. Замініть URL у цих посиланнях.

ERROR_NOT_VALID_HEADINGS: Сторінки з неправильним порядком заголовків
ERROR_NOT_VALID_HEADINGS_DESC: Теги заголовків на цих сторінках не дотримуються правильного порядку. Заголовки повинні починатися з H1 і слідувати чіткій ієрархії (H2, H3 тощо). Правильна структура допомагає пошуковим системам зрозуміти контент і покращує доступність.

ERROR_HREFLANG_TO_NON_CANONICAL: Hreflang на неканонічну сторінку
ERROR_HREFLANG_TO_NON_CANONICAL_DESC: Теги hreflang вказують пошуковим системам, де знайти контент певною мовою. Посилання hreflang на неканонічні сторінки заплутує пошукові системи.

ERROR_NOFOLLOW_INDEXABLE: Внутрішні nofollow посилання на індексовані сторінки
ERROR_NOFOLLOW_INDEXABLE_DESC: Внутрішні посилання з атрибутом nofollow кажуть пошуковим системам не сканувати це посилання. Щоб це працювало правильно, цільовий URL повинен використовувати тег noindex, інакше пошукові системи все одно можуть проіндексувати його.

ERROR_NO_INDEXABLE: Сторінки, що не індексуються
ERROR_NO_INDEXABLE_DESC: Сторінки з атрибутом noindex не будуть проіндексовані пошуковими системами. Зазвичай це додають до неважливих сторінок. Варто перевірити, чи не використовується цей атрибут на важливих сторінках.

ERROR_HREFLANG_NO_INDEXABLE: Hreflang на сторінку, що не індексується
ERROR_HREFLANG_NO_INDEXABLE_DESC: Hreflang повинен посилатися на сторінки, що індексуються. Посилання на сторінки з атрибутом noindex заплутає пошукові системи.

ERROR_BLOCKED: URL заблоковані в robots.txt
ERROR_BLOCKED_DESC: Сторінки, заблоковані в robots.txt, не будуть проскановані пошуковими системами. Слідкуйте за цим списком, щоб переконатися, що важливі сторінки не заблоковані.

ERROR_ORPHAN: Сирітські сторінки
ERROR_ORPHAN_DESC: Сторінки, на які немає посилань ніде на вашому сайті. Це означає, що відвідувачі не можуть на них потрапити, і це може призвести до марної трати бюджету сканування.

NO_INDEX_IN_SITEMAP: Сторінки, що не індексуються, включені в карту сайту
NO_INDEX_IN_SITEMAP_DESC: Сторінки, що не підлягають індексації, не повинні бути в карті сайту, оскільки це надсилає змішані сигнали пошуковим системам. Це також може уповільнити процес сканування.

BLOCKED_IN_SITEMAP: Заблоковані сторінки включені в карту сайту
BLOCKED_IN_SITEMAP_DESC: Сторінки, заблоковані файлом robots.txt, не повинні бути в карті сайту. Це надсилає змішані сигнали пошуковим системам і може призвести до неправильної індексації.

NON_CANONICAL_IN_SITEMAP: Неканонічні сторінки включені в карту сайту
NON_CANONICAL_IN_SITEMAP_DESC: Неканонічні сторінки не повинні бути в карті сайту, оскільки вони можуть ввести в оману пошукові системи, витрачати час і ресурси та призвести до неправильної індексації.

INCOMING_FOLLOW_NOFOLLOW: Сторінки з вхідними follow та nofollow посиланнями
INCOMING_FOLLOW_NOFOLLOW_DESC: Наявність сторінок, на які ведуть як follow, так і nofollow внутрішні посилання, може розмити сигнали авторитетності та релевантності, заплутуючи пошукові системи.

INVALID_LANG: Сторінки з недійсним атрибутом lang
INVALID_LANG_DESC: Сторінки з неправильним атрибутом lang можуть створювати проблеми для пошукових систем та користувачів. Пошукові системи можуть не визначити мову контенту, а у користувачів можуть виникнути проблеми зі скрінрідерами.

HTTP_SCHEME: Сторінки, що використовують протокол HTTP
HTTP_SCHEME_DESC: Сторінки використовують HTTP замість HTTPS. Використання HTTPS є важливим, оскільки це забезпечує безпеку та довіру, що може покращити залучення користувачів та позиції в пошуку.

DEAD_END: Тупикові сторінки
DEAD_END_DESC: Тупикова сторінка — це вебсторінка, яка не має посилань на інші сторінки. Це означає, що користувачі та пошукові системи не можуть рухатися далі, що ускладнює дослідження сайту.

ERROR_CANONICALIZED_NON_INDEXABLE: Канонічне посилання на сторінку, що не індексується
ERROR_CANONICALIZED_NON_INDEXABLE_DESC: Сторінки, канонічне посилання яких веде на сторінки, що не індексуються. Це по суті каже пошуковим системам, що пріоритетною версією є та, яка не індексується, що призводить до плутанини.

ERROR_HREFLANG_REDIRECT: Hreflang на перенаправлення
ERROR_HREFLANG_REDIRECT_DESC: Сторінки, які мають посилання hreflang на сторінки, що перенаправляють (код 30x). Це може створити плутанину для пошукових систем, які намагаються зрозуміти зв'язок між оригінальною та перенаправленою сторінкою.

ERROR_CANONICAL_REDIRECT: Канонічне посилання на перенаправлення
ERROR_CANONICAL_REDIRECT_DESC: Сторінки, канонічне посилання яких веде на редірект замість фактичної бажаної версії сторінки. Це може заплутати пошукові системи.

ERROR_HREFLANG_ERROR: Hreflang на помилку
ERROR_HREFLANG_ERROR_DESC: Сторінки, які мають теги hreflang, що вказують на URL з помилками (40x або 50x). Це унеможливлює правильну індексацію різних версій сторінки.

ERROR_CANONICAL_ERROR: Канонічне посилання на помилку
ERROR_CANONICAL_ERROR_DESC: Сторінки, канонічне посилання яких веде на URL з помилками (40x або 50x). Це може заплутати пошукові системи, які не зможуть просканувати пріоритетну версію сторінки.

ERROR_MULTIPLE_CANONICAL_TAGS: Кілька канонічних тегів
ERROR_MULTIPLE_CANONICAL_TAGS_DESC: Сторінки, які містять більше одного тегу canonical. Це заплутує пошукові системи щодо того, яка версія є пріоритетною.

ERROR_RELATIVE_CANONICAL_URL: Canonical з відносним URL
ERROR_RELATIVE_CANONICAL_URL_DESC: Сторінки, які використовують відносні URL у тезі canonical. Хоча деякі пошукові системи це підтримують, це може викликати проблеми в довгостроковій перспективі. Використовуйте абсолютні URL.

ERROR_HREFLANG_XDEFAULT: Відсутній тег мови за замовчуванням
ERROR_HREFLANG_XDEFAULT_DESC: Сторінки без значення hreflang "x-default". Вказування мови або регіону за замовчуванням забезпечує правильну індексацію для користувачів, які не відповідають жодному конкретному тегу hreflang.

ERROR_HREFLANG_SELF_REFERENCE: Відсутнє посилання hreflang на саму себе
ERROR_HREFLANG_SELF_REFERENCE_DESC: Включення посилання на саму себе в тегах hreflang є критичним для вказівки мови або регіону поточної сторінки.

ERROR_HREFLANG_MISMATCHING_LANG: Невідповідність мови
ERROR_HREFLANG_MISMATCHING_LANG_DESC: Використання різних кодів мови в атрибуті HTML lang та значенні hreflang (посилання на себе) може заплутати пошукові системи.

ERROR_HREFLANG_RELATIVE_URL: Значення Hreflang з відносними URL
ERROR_HREFLANG_RELATIVE_URL_DESC: Альтернативні URL у тегах hreflang повинні бути абсолютними. Замініть їх, щоб уникнути проблем зі скануванням та визначенням мови.

ERROR_CANONICAL_MISMATCH: Невідповідність Canonical
ERROR_CANONICAL_MISMATCH_DESC: Сторінки з різними канонічними URL у HTML-коді та HTTP-заголовках. Це створює неузгодженість і може заплутати пошукові системи.

ERROR_MISSING_HSTS: Відсутній заголовок HSTS
ERROR_MISSING_HSTS_DESC: Сторінки без заголовка HSTS. Відсутність HTTP Strict Transport Security робить сайти більш вразливими до загроз безпеки.

ERROR_MISSING_CSP: Відсутня політика безпеки контенту (CSP)
ERROR_MISSING_CSP_DESC: Сторінки без мета-тегу або HTTP-заголовка CSP (Content Security Policy) більш вразливі до загроз безпеки, таких як шкідливий контент.

ERROR_CONTENT_TYPE_OPTIONS: Відсутні параметри типу контенту
ERROR_CONTENT_TYPE_OPTIONS_DESC: Сторінки без заголовка X-Content-Type-Options, що наражає вебсайт на ризики безпеки типу контенту.

ERROR_LARGE_IMAGE: Великі зображення
ERROR_LARGE_IMAGE_DESC: Великі зображення можуть уповільнити завантаження вебсторінки, негативно впливаючи на досвід користувачів та SEO-рейтинг. Оптимізуйте їх до розумного розміру.

ERROR_LONG_ALT_TEXT: Зображення з довгим текстом Alt
ERROR_LONG_ALT_TEXT_DESC: Сторінки, що мають зображення з довгим текстом в атрибуті alt. Намагайтеся робити alt-текст коротким і по суті.

ERROR_MULTIPLE_TITLES: Кілька тегів title
ERROR_MULTIPLE_TITLES_DESC: Сторінки з більш ніж одним тегом title у хедері. Це може зашкодити SEO, заплутуючи пошукові системи.

ERROR_MULTIPLE_DESCRIPTIONS: Кілька мета-тегів description
ERROR_MULTIPLE_DESCRIPTIONS_DESC: Сторінки з більш ніж одним мета-тегом description. Це може зашкодити SEO, заплутуючи пошукові системи.

ERROR_PAGE_DEPTH: Велика глибина
ERROR_PAGE_DEPTH_DESC: Сторінки з великою глибиною вкладеності негативно впливають на SEO та досвід користувачів, оскільки їх важко знайти як людям, так і ботам.

ERROR_MULTIPLE_LANG_REFERENCE: Посилання на кілька мов
ERROR_MULTIPLE_LANG_REFERENCE_DESC: Сторінки з посиланнями на кілька мов у тегах hreflang можуть заплутати пошукові системи, що призведе до неправильної індексації мов.

ERROR_DUPLICATED_CONTENT: Дубльований контент
ERROR_DUPLICATED_CONTENT_DESC: Сторінки з абсолютно однаковим контентом можуть заплутати пошукові системи, яким важко визначити найбільш релевантну сторінку.

ERROR_EXTERNAL_LINK_REDIRECT: Сторінки із зовнішніми посиланнями на редіректи
ERROR_EXTERNAL_LINK_REDIRECT_DESC: Зовнішні посилання на перенаправлені сторінки не вплинуть на позиції, але можуть вплинути на досвід користувачів. Замініть посилання на кінцеві пункти призначення.

ERROR_EXTERNAL_LINK_BROKEN: Сторінки з битими зовнішніми посиланнями
ERROR_EXTERNAL_LINK_BROKEN_DESC: Биті зовнішні посилання дратують користувачів, приводячи їх на неіснуючі сторінки. Видаліть або оновіть посилання.

ERROR_TIMEOUT: Тайм-аут
ERROR_TIMEOUT_DESC: Сторінки, час очікування яких минув, коли наш сканер намагався отримати до них доступ. Це може свідчити про проблеми з сервером.

ERROR_UNDERSCORE_URL: URL із символами підкреслення
ERROR_UNDERSCORE_URL_DESC: Зазвичай не рекомендується використовувати підкреслення в URL, оскільки деякі пошукові системи можуть ігнорувати їх. Використовуйте дефіс як роздільник слів.

ERROR_SLOW_TTFB: Повільний час до першого байта (TTFB)
ERROR_SLOW_TTFB_DESC: Повільний TTFB може негативно вплинути на досвід користувачів і зашкодити SEO через довший час завантаження сторінки.

ERROR_HTTP_FORM: Форми на HTTP сторінках
ERROR_HTTP_FORM_DESC: Наявність форми на HTTP URL порушує безпеку, знижує довіру користувачів і позиції в SEO. Переконайтеся, що ваші форми знаходяться на HTTPS сторінках.

ERROR_INSECURE_FORM: Небезпечні форми
ERROR_INSECURE_FORM_DESC: Сторінки, що мають форми з HTTP URL у полі action. Це наражає дані на перехоплення і викликає попередження браузера.

ERROR_SPACE_URL: URL, що містять пробіл
ERROR_SPACE_URL_DESC: Наявність пробілу в URL може спричинити проблеми з індексацією та биті посилання. Замість пробілів слід використовувати дефіси.

ERROR_MULTIPLE_SLASHES: URL з кількома слішами в шляху
ERROR_MULTIPLE_SLASHES_DESC: URL з кількома послідовними слішами (//). Це може створити плутанину для пошукових систем та користувачів.

ERROR_NOIMAGEINDEX: Сторінки з правилом noimageindex
ERROR_NOIMAGEINDEX_DESC: Правило noimageindex у мета-тезі robots забороняє індексацію зображень пошуковими системами. Перевірте ці сторінки.

ERROR_PICTURE_MISSONG_IMG: Сторінки з picture без елемента img
ERROR_PICTURE_MISSONG_IMG_DESC: Сторінки, що використовують елемент picture, в якому відсутній елемент img. Це може спричинити неправильне відображення та проблеми з індексацією.

ERROR_METAS_IN_BODY: Сторінки з мета-тегами в тілі документа
ERROR_METAS_IN_BODY_DESC: Мета-теги повинні бути розміщені в секції head. В іншому випадку вони можуть бути проігноровані браузерами та пошуковими системами.

ERROR_NOSNIPPET: Сторінки з директивою nosnippet
ERROR_NOSNIPPET_DESC: Директива nosnippet або max-snippet:0 каже пошуковим системам не показувати текстовий сніпет або прев'ю відео в результатах пошуку.

ERROR_IMG_SIZE_ATTR: Сторінки з зображеннями без атрибутів розміру
ERROR_IMG_SIZE_ATTR_DESC: Не встановлення атрибутів розміру для зображень може спричинити зсуви макета (CLS) під час завантаження сторінки, що негативно впливає на UX та SEO.

ERROR_INCORRECT_MEDIA_TYPE: URL з неправильним типом медіа
ERROR_INCORRECT_MEDIA_TYPE_DESC: Неправильні MIME-типи можуть зашкодити SEO, змушуючи браузери неправильно інтерпретувати контент.

ERROR_DUPLICATED_ID: Сторінки з елементами, що мають дубльовані ID
ERROR_DUPLICATED_ID_DESC: Наявність елементів з однаковими ID заплутує допоміжні технології та JavaScript, що призводить до проблем з навігацією. Переконайтеся, що ID унікальні.

ERROR_MISSING_VIEWPORT: Сторінки без мета-тегу viewport
ERROR_MISSING_VIEWPORT_DESC: Вебсторінка без мета-тегу viewport не буде відображатися належним чином на мобільних пристроях, що призведе до поганого досвіду та нижчих позицій.

ERROR_DOM_SIZE: HTML-документи з надмірним розміром DOM
ERROR_DOM_SIZE_DESC: Сторінки з великим розміром DOM можуть уповільнити завантаження і ускладнити сканування. Спростіть структуру HTML.

ERROR_PAGINATION_LINKS: Посилання пагінації не пов'язані
ERROR_PAGINATION_LINKS_DESC: Наявність тегів link rel="next" та link rel="prev" без відповідних посилань у тілі сторінки заплутує пошукові системи.

ERROR_LOCALHOST_LINKS: Вебсторінки з посиланнями на localhost
ERROR_LOCALHOST_LINKS_DESC: Посилання на localhost або 127.0.0.1 недоступні для користувачів і пошукових систем. Замініть їх на коректні публічні URL.
